version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  # See note in .github/workflows/docs.yml — fail_on_warning will be
  # re-enabled once the autodoc + dataclass duplicate-object warnings
  # are resolved.
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
        - io
        - plot

formats:
  - htmlzip
  - pdf
